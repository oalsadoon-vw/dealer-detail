services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: dealerdetail
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dealerdetail_pgdata:/var/lib/postgresql/data

volumes:
  dealerdetail_pgdata:


